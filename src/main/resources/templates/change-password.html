<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: header}"></head>
<body class="bg-slate-50">
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-8">

    <div class="flex items-center gap-2 text-sm text-slate-400 mb-6">
        <a th:href="@{/profile}" class="hover:text-slate-600 transition-colors">Profil</a>
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
        </svg>
        <span class="text-slate-600">Ganti Password</span>
    </div>

    <div class="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden">
        <div class="px-8 py-5 border-b border-slate-100 bg-slate-50">
            <h1 class="text-xl font-bold text-slate-800">Ganti Password</h1>
            <p class="text-sm text-slate-400 mt-0.5">Masukkan password lama dan password baru Anda</p>
        </div>

        <div class="p-8">

            <div th:if="${error}" role="alert"
                 class="mb-5 flex items-start gap-3 p-3.5 bg-red-50 border border-red-200 rounded-lg text-sm text-red-700">
                <svg class="w-4 h-4 mt-0.5 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/>
                </svg>
                <span th:text="${error}">Error</span>
            </div>

            <form th:action="@{/profile/change-password}"
                  th:object="${changePasswordRequest}" method="post" class="space-y-5">

                <div>
                    <label for="oldPassword" class="block text-sm font-medium text-slate-700 mb-1.5">
                        Password Lama <span class="text-red-500">*</span>
                    </label>
                    <input type="password" id="oldPassword" th:field="*{oldPassword}"
                           class="w-full px-4 py-2.5 text-sm border border-slate-200 rounded-xl outline-none focus:border-green-500 focus:ring-2 focus:ring-green-100 transition-all"
                           placeholder="Masukkan password lama" required autofocus>
                </div>

                <div>
                    <label for="newPassword" class="block text-sm font-medium text-slate-700 mb-1.5">
                        Password Baru <span class="text-red-500">*</span>
                    </label>
                    <input type="password" id="newPassword" th:field="*{newPassword}"
                           class="w-full px-4 py-2.5 text-sm border border-slate-200 rounded-xl outline-none focus:border-green-500 focus:ring-2 focus:ring-green-100 transition-all"
                           placeholder="Masukkan password baru" required>
                </div>

                <div>
                    <label for="confirmNewPassword" class="block text-sm font-medium text-slate-700 mb-1.5">
                        Konfirmasi Password Baru <span class="text-red-500">*</span>
                    </label>
                    <input type="password" id="confirmNewPassword" th:field="*{confirmNewPassword}"
                           class="w-full px-4 py-2.5 text-sm border border-slate-200 rounded-xl outline-none focus:border-green-500 focus:ring-2 focus:ring-green-100 transition-all"
                           placeholder="Ulangi password baru" required>
                </div>

                <div class="flex flex-col sm:flex-row gap-3 pt-2 border-t border-slate-100">
                    <button type="submit"
                            class="flex-1 px-6 py-2.5 bg-green-600 text-white text-sm font-semibold rounded-xl hover:bg-green-700 transition-colors">
                        Simpan Password
                    </button>
                    <a th:href="@{/profile}"
                       class="flex-1 sm:flex-none px-6 py-2.5 border border-slate-200 text-slate-600 text-sm font-medium rounded-xl hover:bg-slate-50 transition-colors text-center">
                        Batal
                    </a>
                </div>

            </form>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
